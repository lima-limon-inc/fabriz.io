# This action will be triggered when a new github release is made.
# Sidenote: Currently github releases are created manually.
name: Publish Rust Crates on Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-24.04
    env:
      CARGO_TERM_COLOR: always
      # Important: use an absolute path so `cargo publish` verification builds
      # (which happen from `target/package/...`) don't create nested `target/` dirs.
      CARGO_TARGET_DIR: ${{ github.workspace }}/target
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name }}

      - name: Cleanup large tools for build space
        uses: ./.github/actions/cleanup-runner

      - name: Log release info
        run: |
          echo "Publishing release ${{ github.event.release.tag_name }}"
          echo "Commit: $(git rev-parse HEAD)"

      - name: Update Rust toolchain
        run: |
          rustup update --no-self-update

      - name: Preflight - publish dry run
        continue-on-error: true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          cargo publish --workspace --exclude miden-client-web --exclude miden-idxdb-store --dry-run
          cd crates/idxdb-store
          cargo publish --dry-run
          cd ../web-client
          cargo publish --dry-run

      - name: Cleanup cargo package artifacts (after dry-run)
        if: always()
        run: |
          rm -rf "$CARGO_TARGET_DIR/package" || true

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          cargo publish --workspace --exclude miden-client-web --exclude miden-idxdb-store
          cd crates/idxdb-store
          cargo publish
          cd ../web-client
          cargo publish

  # Upload the miden-client CLI as an artifact on the Github release.
  # This is used by midenup to speed installs up.
  upload-artifacts:
    name: upload pre-built miden-client executable artifacts
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
        target: [aarch64-apple-darwin, x86_64-unknown-linux-gnu]
        exclude:
          - os: macos-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name }}
      - uses: ./.github/actions/cleanup-runner
      - name: Install Rust
        run: |
          rustup update --no-self-update
          rustc --version
      - name: Add target
        run: |
          rustup target add ${{ matrix.target }}
      - name: Build miden-client
        run: |
          BUILD_TARGET=${{ matrix.target }} make build-cli 
      - name: Prepare artifact
        run: |
          mv target/${{ matrix.target }}/release/miden-client miden-client-${{ matrix.target }}
      - name: Attest miden-client
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: miden-client-${{ matrix.target }}
      - name: Upload
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          gh release upload ${RELEASE_TAG} miden-client-${{ matrix.target }}
